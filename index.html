<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>Jonbot Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }
        
        .timestamp {
            font-size: 0.85rem;
            color: #888;
        }
        
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #2a2a2a;
        }
        
        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 12px;
        }
        
        .cost-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        @media (min-width: 500px) {
            .cost-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .cost-item {
            text-align: center;
        }
        
        .cost-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #4ade80;
        }
        
        .cost-value.warning {
            color: #fbbf24;
        }
        
        .cost-value.high {
            color: #f87171;
        }
        
        .cost-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }
        
        .daily-breakdown {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #333;
        }
        
        .daily-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        
        .daily-row:last-child {
            border-bottom: none;
        }
        
        .daily-date {
            color: #aaa;
        }
        
        .daily-amount {
            font-weight: 600;
            color: #4ade80;
        }
        
        /* Project cards - clickable */
        .project {
            padding: 16px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .project:hover {
            background: #222;
        }
        
        .project:last-child {
            border-bottom: none;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .project-name {
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .expand-icon {
            font-size: 0.8rem;
            color: #666;
            transition: transform 0.2s;
        }
        
        .project.expanded .expand-icon {
            transform: rotate(90deg);
        }
        
        .project-status {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .status-awaiting {
            background: #422006;
            color: #fbbf24;
        }
        
        .status-active {
            background: #052e16;
            color: #4ade80;
        }
        
        .status-research {
            background: #1e1b4b;
            color: #a78bfa;
        }
        
        .status-complete {
            background: #164e63;
            color: #22d3d3;
        }
        
        .status-planning {
            background: #1f2937;
            color: #9ca3af;
        }
        
        .project-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .project-awaiting {
            background: #1c1917;
            border-left: 3px solid #fbbf24;
            padding: 12px;
            margin-top: 12px;
            border-radius: 0 8px 8px 0;
        }
        
        .project-awaiting-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #fbbf24;
            margin-bottom: 8px;
        }
        
        .project-awaiting ul {
            list-style: none;
            padding-left: 0;
        }
        
        .project-awaiting li {
            font-size: 0.85rem;
            color: #d6d3d1;
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }
        
        .project-awaiting li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #fbbf24;
        }
        
        /* Expandable details */
        .project-details {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #333;
        }
        
        .project.expanded .project-details {
            display: block;
        }
        
        .detail-section {
            margin-bottom: 16px;
        }
        
        .detail-section:last-child {
            margin-bottom: 0;
        }
        
        .detail-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 8px;
        }
        
        .detail-content {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
        }
        
        .deliverable-link {
            display: inline-block;
            background: #1e3a5f;
            color: #60a5fa;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .deliverable-link:hover {
            background: #2d4a6f;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .metric {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #4ade80;
        }
        
        .metric-label {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }
        
        /* Liberty section */
        .liberty-section {
            background: linear-gradient(135deg, #1e3a5f 0%, #1a1a2e 100%);
            border: 1px solid #2d4a6f;
        }
        
        .liberty-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .liberty-icon {
            font-size: 1.25rem;
        }
        
        .liberty-title {
            font-weight: 600;
            color: #fff;
        }
        
        .liberty-email {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .liberty-email:last-child {
            margin-bottom: 0;
        }
        
        .liberty-email-date {
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 4px;
        }
        
        .liberty-email-subject {
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        
        .liberty-email-preview {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.4;
        }
        
        .refresh-note {
            text-align: center;
            font-size: 0.75rem;
            color: #555;
            margin-top: 24px;
        }
        
        .lobster-emoji {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="lobster-emoji">🦞</span> Jonbot Dashboard</h1>
            <span class="timestamp" id="last-updated"></span>
        </header>

        <!-- API Costs -->
        <div class="card">
            <div class="card-title">API Costs (Anthropic)</div>
            <div class="cost-grid">
                <div class="cost-item">
                    <div class="cost-value" id="cost-today">$0</div>
                    <div class="cost-label">Today</div>
                </div>
                <div class="cost-item">
                    <div class="cost-value" id="cost-7day">$0</div>
                    <div class="cost-label">Last 7 Days</div>
                </div>
                <div class="cost-item">
                    <div class="cost-value" id="cost-mtd">$0</div>
                    <div class="cost-label">MTD (April)</div>
                </div>
                <div class="cost-item">
                    <div class="cost-value" id="cost-total">$0</div>
                    <div class="cost-label">All-Time</div>
                </div>
            </div>
            <div class="daily-breakdown" id="daily-breakdown"></div>
        </div>

        <!-- Projects Awaiting Response -->
        <div class="card">
            <div class="card-title">Projects Awaiting Response</div>
            <div id="projects-awaiting"></div>
        </div>

        <!-- Active Projects -->
        <div class="card">
            <div class="card-title">Active Projects</div>
            <div id="projects-active"></div>
        </div>

        <!-- Liberty Updates -->
        <div class="card liberty-section">
            <div class="liberty-header">
                <span class="liberty-icon">🏫</span>
                <span class="liberty-title">Liberty Classical Academy</span>
            </div>
            <div id="liberty-content"></div>
        </div>

        <div class="refresh-note">Auto-refreshes every 5 minutes • Tap project cards for details</div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                const data = await response.json();
                renderDashboard(data);
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        function formatCurrency(amount) {
            return '$' + amount.toFixed(2);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T12:00:00');
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function toggleProject(el) {
            el.classList.toggle('expanded');
        }

        function renderDashboard(data) {
            document.getElementById('last-updated').textContent = 
                'Updated: ' + new Date(data.generated).toLocaleString();

            // Costs
            const costs = data.costs;
            document.getElementById('cost-today').textContent = formatCurrency(costs.today || 0);
            document.getElementById('cost-7day').textContent = formatCurrency(costs.last_7_days || 0);
            document.getElementById('cost-mtd').textContent = formatCurrency(costs.mtd || 0);
            document.getElementById('cost-total').textContent = formatCurrency(costs.total_all_time || 0);

            const todayEl = document.getElementById('cost-today');
            todayEl.className = 'cost-value';
            if (costs.today > 75) todayEl.classList.add('high');
            else if (costs.today > 40) todayEl.classList.add('warning');

            // Daily breakdown
            const dailyHtml = Object.entries(costs.daily_breakdown || {})
                .sort((a, b) => b[0].localeCompare(a[0]))
                .slice(0, 7)
                .map(([date, amount]) => `
                    <div class="daily-row">
                        <span class="daily-date">${formatDate(date)}</span>
                        <span class="daily-amount">${formatCurrency(amount)}</span>
                    </div>
                `).join('');
            document.getElementById('daily-breakdown').innerHTML = dailyHtml;

            // Projects awaiting
            const awaitingProjects = Object.entries(data.projects || {})
                .filter(([_, p]) => p.status === 'awaiting-client' && p.awaiting?.length > 0);
            
            const awaitingHtml = awaitingProjects.map(([key, p]) => {
                const detailsHtml = renderProjectDetails(key, p);
                return `
                <div class="project" onclick="toggleProject(this)">
                    <div class="project-header">
                        <span class="project-name">
                            <span class="expand-icon">▶</span>
                            ${p.client || key}
                        </span>
                        <span class="project-status status-awaiting">Awaiting Client</span>
                    </div>
                    <div class="project-desc">${p.description || ''}</div>
                    <div class="project-awaiting">
                        <div class="project-awaiting-title">Waiting On</div>
                        <ul>
                            ${p.awaiting.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                    ${detailsHtml}
                </div>
            `}).join('');
            
            document.getElementById('projects-awaiting').innerHTML = 
                awaitingHtml || '<div style="color:#666;padding:16px 0;">No projects awaiting response</div>';

            // Active projects
            const activeProjects = Object.entries(data.projects || {})
                .filter(([_, p]) => p.status === 'active' || p.status === 'research' || p.status === 'planning');
            
            const statusClass = {
                'active': 'status-active',
                'research': 'status-research',
                'planning': 'status-planning',
                'complete': 'status-complete'
            };
            
            const statusLabel = {
                'active': 'Active',
                'research': 'Research',
                'planning': 'Planning',
                'complete': 'Complete'
            };
            
            const activeHtml = activeProjects.map(([key, p]) => {
                const detailsHtml = renderProjectDetails(key, p);
                return `
                <div class="project" onclick="toggleProject(this)">
                    <div class="project-header">
                        <span class="project-name">
                            <span class="expand-icon">▶</span>
                            ${p.client || key}
                        </span>
                        <span class="project-status ${statusClass[p.status] || ''}">${statusLabel[p.status] || p.status}</span>
                    </div>
                    <div class="project-desc">${p.description || ''}</div>
                    ${detailsHtml}
                </div>
            `}).join('');
            
            document.getElementById('projects-active').innerHTML = 
                activeHtml || '<div style="color:#666;padding:16px 0;">No active projects</div>';

            // Liberty updates
            const liberty = data.liberty;
            if (liberty && liberty.emails && liberty.emails.length > 0) {
                const libertyHtml = liberty.emails.slice(0, 5).map(email => `
                    <div class="liberty-email">
                        <div class="liberty-email-date">${email.date}</div>
                        <div class="liberty-email-subject">${email.subject}</div>
                        <div class="liberty-email-preview">${email.preview}</div>
                    </div>
                `).join('');
                document.getElementById('liberty-content').innerHTML = libertyHtml;
            } else {
                document.getElementById('liberty-content').innerHTML = `
                    <div style="color:#94a3b8;">No recent Liberty updates.</div>
                `;
            }
        }

        function renderProjectDetails(key, p) {
            let html = '<div class="project-details">';
            
            // Metrics if available
            if (p.metrics) {
                html += `
                    <div class="detail-section">
                        <div class="detail-title">Key Metrics</div>
                        <div class="metrics-grid">
                            ${Object.entries(p.metrics).map(([k, v]) => `
                                <div class="metric">
                                    <div class="metric-value">${v.value}</div>
                                    <div class="metric-label">${v.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Deliverables if available
            if (p.deliverables && Object.keys(p.deliverables).length > 0) {
                html += `
                    <div class="detail-section">
                        <div class="detail-title">Deliverables</div>
                        <div>
                            ${Object.entries(p.deliverables).map(([name, url]) => 
                                `<a href="${url}" target="_blank" class="deliverable-link">${name.replace(/_/g, ' ')}</a>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Summary if available
            if (p.summary) {
                html += `
                    <div class="detail-section">
                        <div class="detail-title">Summary</div>
                        <div class="detail-content">${p.summary}</div>
                    </div>
                `;
            }
            
            // Timeline/milestones if available
            if (p.milestones && p.milestones.length > 0) {
                html += `
                    <div class="detail-section">
                        <div class="detail-title">Timeline</div>
                        <div class="detail-content">
                            ${p.milestones.map(m => `<div style="padding:4px 0;">• ${m}</div>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            return html;
        }

        loadData();
    </script>
</body>
</html>
